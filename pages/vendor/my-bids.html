<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bids - Kissan Market</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/vendor.css">
    <script src="../../js/chat.js" defer></script>
</head>
<body>

    <div class="dashboard-layout">
        <aside class="sidebar">
            <a href="dashboard.html" class="sidebar-logo"><span>🚚 Kissan Market</span></a>
            <ul class="sidebar-menu">
                <li class="menu-item"><a href="dashboard.html" class="menu-link"><i>📊</i> Dashboard</a></li>
                <li class="menu-item"><a href="marketplace.html" class="menu-link"><i>🛒</i> Marketplace</a></li>
                <li class="menu-item"><a href="my-bids.html" class="menu-link active"><i>⚖️</i> My Bids</a></li>
                <li class="menu-item"><a href="orders.html" class="menu-link"><i>📦</i> Buyer Orders</a></li>
                <li class="menu-item"><a href="notifications.html" class="menu-link"><i>🔔</i> Notifications</a></li>
                <li class="menu-item"><a href="profile.html" class="menu-link"><i>👤</i> My Profile</a></li>
            </ul>
            <div class="sidebar-footer">
                <a href="#" class="menu-link" onclick="State.logout()"><i>🚪</i> Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="header-left"><h2>My Bidding Activity</h2></div>
                <div class="header-right"><div class="user-profile"><div class="avatar">V</div></div></div>
            </header>

            <div class="container fade-in">
                <div class="card" style="margin-bottom: 2rem;">
                    <div style="display: flex; gap: 2rem;">
                        <div>
                            <p style="font-size: 0.8rem; color: var(--text-muted);">Active Bids</p>
                            <h3 id="active-count">0</h3>
                        </div>
                        <div style="border-left: 1px solid #ddd; padding-left: 2rem;">
                            <p style="font-size: 0.8rem; color: var(--text-muted);">Wins</p>
                            <h3 id="win-count" style="color: var(--accent-green);">0</h3>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <table style="width: 100%; border-collapse: collapse; text-align: left;">
                        <thead>
                            <tr style="border-bottom: 2px solid var(--secondary-color);">
                                <th style="padding: 1rem;">Product</th>
                                <th style="padding: 1rem;">Farmer</th>
                                <th style="padding: 1rem;">My Bid</th>
                                <th style="padding: 1rem;">Status</th>
                                <th style="padding: 1rem;">Time</th>
                                <th style="padding: 1rem;">Action</th>
                            </tr>
                        </thead>
                        <tbody id="bids-table-body">
                            <!-- Bids injected here -->
                        </tbody>
                    </table>
                    <div id="empty-bids" style="text-align: center; padding: 4rem; display: none;">
                        <p style="color: var(--text-muted);">You haven't placed any bids yet.</p>
                        <a href="marketplace.html" class="btn btn-primary" style="margin-top: 1rem;">Explore Marketplace</a>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../../js/app.js"></script>
    <script src="../../js/vendor.js"></script>
    <script src="../../js/chat.js"></script>
    <script>
        function renderMyBids() {
            const user = State.getCurrentUser();
            const bids = State.getBids().filter(b => b.vendorId === user.id);
            const body = document.getElementById('bids-table-body');
            const empty = document.getElementById('empty-bids');
            
            document.getElementById('active-count').innerText = bids.filter(b => b.status === 'pending').length;
            document.getElementById('win-count').innerText = bids.filter(b => b.status === 'accepted').length;
 
            if (bids.length === 0) {
                empty.style.display = 'block';
                body.innerHTML = '';
                return;
            }

            empty.style.display = 'none';
            body.innerHTML = bids.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp)).map(bid => {
                const product = State.getProducts().find(p => p.id === bid.productId);
                const highestBid = State.getHighestBid(bid.productId);
                const isWinning = highestBid && highestBid.vendorId === user.id;
                const timeLeft = product ? UI.formatTimeLeft(product.endTime) : 'Closed';
                
                let statusText = bid.status.toUpperCase();
                let statusColor = bid.status === 'accepted' ? '#2e7d32' : (bid.status === 'rejected' ? '#c62828' : '#e65100');
                let statusBg = bid.status === 'accepted' ? '#e8f5e9' : (bid.status === 'rejected' ? '#ffebee' : '#fff3e0');

                if (bid.status === 'pending' && product) {
                    if (isWinning) {
                        statusText = '🏆 WINNING';
                        statusColor = '#2e7d32';
                        statusBg = '#e8f5e9';
                    } else {
                        statusText = '⚠️ OUTBID';
                        statusColor = '#ef6c00';
                        statusBg = '#fff3e0';
                    }
                }

                return `
                <tr style="border-bottom: 1px solid #eee;" class="fade-in">
                    <td style="padding: 1.2rem;">
                        <p style="font-weight: 600;">${bid.productName}</p>
                        <p style="font-size: 0.7rem; color: var(--text-muted);">ID: #${bid.productId}</p>
                    </td>
                    <td style="padding: 1.2rem;">
                        <p style="font-size: 0.9rem;">${bid.farmerName || 'Farmer'}</p>
                    </td>
                    <td style="padding: 1.2rem;">
                        <p style="font-weight: 700; color: var(--primary-color);">₹${bid.amount}</p>
                        ${bid.status === 'countered' ? `<p style="font-size: 0.7rem; color: #e65100;">Farmer Counter: ₹${bid.counterAmount}</p>` : (!isWinning && highestBid ? `<p style="font-size: 0.7rem; color: var(--text-muted);">High: ₹${highestBid.amount}</p>` : '')}
                    </td>
                    <td style="padding: 1.2rem;">
                        <span style="padding: 0.3rem 0.6rem; border-radius: 20px; font-size: 0.75rem; font-weight: 800; background: ${statusBg}; color: ${statusColor}; border: 1px solid ${statusColor}44;">
                            ${statusText}
                        </span>
                    </td>
                    <td style="padding: 1.2rem; color: var(--text-muted); font-size: 0.85rem; font-weight: 600;">
                        ${timeLeft}
                    </td>
                    <td style="padding: 1.2rem; display: flex; gap: 0.5rem; align-items: center;">
                        ${bid.status === 'accepted' ? 
                            `<button class="btn btn-primary" style="padding: 0.4rem 0.8rem; font-size: 0.75rem;" onclick="UI.showToast('Proceeding to Order...', 'success')">View Response</button>` : 
                            (bid.status === 'pending' || bid.status === 'countered' ? `
                                <a href="marketplace.html" class="btn btn-outline" style="padding: 0.4rem 0.8rem; font-size: 0.75rem; text-decoration: none;">Edit</a>
                                <button class="btn btn-outline" style="padding: 0.4rem 0.8rem; font-size: 0.75rem; border-color: #ffcdd2; color: #c62828;" onclick="if(confirm('Cancel this bid?')) State.cancelBid(${bid.id})">Cancel</button>
                            ` : `<button class="btn btn-outline" style="padding: 0.4rem 0.8rem; font-size: 0.75rem;" onclick="UI.showToast('Auction Closed', 'error')" disabled>Closed</button>`)
                        }
                    </td>
                </tr>
            `}).join('');
        }

        // Real-time updates
        State.listenToChanges(renderMyBids);
        setInterval(renderMyBids, 1000);

        document.addEventListener('DOMContentLoaded', renderMyBids);
    </script>

</body>
</html>
