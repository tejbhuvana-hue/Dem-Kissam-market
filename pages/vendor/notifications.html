<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - Kissan Market</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/vendor.css">
</head>
<body>

    <div class="dashboard-layout">
        <aside class="sidebar">
            <a href="dashboard.html" class="sidebar-logo"><span>🚚 Kissan Market</span></a>
            <ul class="sidebar-menu">
                <li class="menu-item"><a href="dashboard.html" class="menu-link"><i>📊</i> Dashboard</a></li>
                <li class="menu-item"><a href="marketplace.html" class="menu-link"><i>🛒</i> Marketplace</a></li>
                <li class="menu-item"><a href="my-bids.html" class="menu-link"><i>⚖️</i> My Bids</a></li>
                <li class="menu-item"><a href="orders.html" class="menu-link"><i>📦</i> Buyer Orders</a></li>
                <li class="menu-item"><a href="notifications.html" class="menu-link active"><i>🔔</i> Notifications</a></li>
                <li class="menu-item"><a href="profile.html" class="menu-link"><i>👤</i> My Profile</a></li>
            </ul>
            <div class="sidebar-footer">
                <a href="#" class="menu-link" onclick="State.logout()"><i>🚪</i> Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="header-left"><h2>Notifications</h2></div>
                <div class="header-right"><div class="user-profile"><div class="avatar">V</div></div></div>
            </header>

            <div class="container fade-in">
                <div class="card">
                    <div id="notif-list">
                        <!-- Notifications injected here -->
                    </div>
                    <div id="empty-notif" style="text-align: center; padding: 4rem; display: none;">
                        <p style="color: var(--text-muted);">No new notifications.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../../js/app.js"></script>
    <script src="../../js/vendor.js"></script>
    <script>
        function renderNotifications() {
            const user = State.getCurrentUser();
            const notifications = State.getNotifications(user.id);
            const list = document.getElementById('notif-list');
            const empty = document.getElementById('empty-notif');

            if (notifications.length === 0) {
                empty.style.display = 'block';
                list.innerHTML = '';
                return;
            }

            empty.style.display = 'none';
            list.innerHTML = notifications.map(n => `
                <div style="padding: 1.5rem; border-bottom: 1px solid #eee; display: flex; gap: 1rem; align-items: start; background: ${n.read ? 'transparent' : 'rgba(139, 74, 43, 0.05)'}">
                    <div style="width: 10px; height: 10px; background: ${n.read ? '#ddd' : 'var(--primary-color)'}; border-radius: 50%; margin-top: 0.5rem; flex-shrink: 0;"></div>
                    <div style="flex-grow: 1;">
                        <p style="font-weight: ${n.read ? '500' : '700'};">${n.message}</p>
                        <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.3rem;">${new Date(n.timestamp).toLocaleString()}</p>
                    </div>
                    <div style="display: flex; gap: 0.5rem;">
                        ${!n.read ? `<button onclick="State.markNotificationsRead(${user.id})" class="btn btn-outline" style="padding: 0.3rem 0.6rem; font-size: 0.7rem;">Read</button>` : ''}
                        <button onclick="State.deleteNotification(${n.id})" class="btn btn-outline" style="padding: 0.3rem 0.6rem; font-size: 0.7rem; border-color: #ffcdd2; color: #c62828;">Delete</button>
                    </div>
                </div>
            `).join('');

            // Sync UI
            UI.updateNotificationBadges();
        }

        State.listenToChanges(renderNotifications);
        document.addEventListener('DOMContentLoaded', renderNotifications);
    </script>
</body>
</html>
