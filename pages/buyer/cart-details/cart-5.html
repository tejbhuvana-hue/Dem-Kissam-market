<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    
<button class="back-btn">
 <a href="../home/index.html"> <i class="fa-solid fa-arrow-left"></i></a> 
</button>

<div class="product-container">

    <!-- LEFT SIDE -->
    <div class="image-section">
        <div class="thumbnails">
            <img src="https://www.dole.com/sites/default/files/styles/1024w768h-80/public/media/2025-01/banana-cavendish_0.png?itok=xIgYOIE_-9FKLRtCr" onclick="changeImage(this)">
            <img src="https://media.cnn.com/api/v1/images/stellar/prod/120604032828-fresh-ripe-bananas.jpg?q=x_0,y_106,h_2019,w_3590,c_crop/h_833,w_1480" onclick="changeImage(this)">
            <img src="https://trudes.co.uk/cdn/shop/products/TRUDE1010.jpg?v=1587563100" onclick="changeImage(this)">
        </div>

        <div class="main-image">
            <img id="mainImg" src="https://kisanmarketnow.com/wp-content/uploads/2021/06/WhatsApp-Image-2025-02-24-at-13.50.07_a4d4f7fb-410x410.jpg">
        </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="details">
        <h2>Banana</h2>
        <p>Net Qty: 100 g</p>

        <div class="price">₹50</div>
        <p>MRP (incl. of all taxes)</p>

        <div class="offers">
            <p>✔ Get 5% off with OneCard</p>
            <p>✔ Flat ₹10 cashback on Amazon Pay</p>
            <p>✔ Extra discount with BHIM UPI</p>
        </div>

        <div class="add-cart">
           <button class="add-cart">Add to cart</button>
        </div>

        <div class="icons">
            <div class="icon-box">🔄 Easy Refunds</div>
            <div class="icon-box">⚡ Fast Delivery</div>
        </div>
    </div>

</div>
<script src="./script.js"></script>
</body>
</html>
