<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kisan Market Checkout</title>

  <link rel="stylesheet" href="checkout.css">
</head>

<body>

<!-- NAVBAR -->

<nav class="navbar">

  <div class="navbar-brand">
    🛒 Kisan Market
  </div>

  <div class="cart-count" id="cartCount">
    0 Items
  </div>

</nav>

<!-- STEP BAR -->

<div class="step-container">

  <div class="step active" id="step1">
    Cart
  </div>

  <div class="step" id="step2">
    Shipping
  </div>

  <div class="step" id="step3">
    Payment
  </div>

  <div class="step" id="step4">
    Confirm
  </div>

</div>

<!-- MAIN CONTAINER -->

<div class="main-container">

  <!-- LEFT SIDE -->

  <div class="left-side">

    <div class="checkout-card">

      <!-- CART SECTION -->

      <div id="cartSection">

        <h3 class="title">
          Cart Items
        </h3>

        <div id="cartItems"></div>

        <button class="main-btn" onclick="goShipping()">
          Proceed To Shipping
        </button>

      </div>

      <!-- SHIPPING -->

      <div id="shippingSection" style="display:none;">

        <h3 class="title">
          Shipping Address
        </h3>

        <input type="text"
        class="input-box"
        placeholder="Full Name"
        id="name">

        <input type="text"
        class="input-box"
        placeholder="Phone Number"
        id="phone">

        <input type="text"
        class="input-box"
        placeholder="Address"
        id="address">

        <div class="input-row">

          <input type="text"
          class="input-box"
          placeholder="City"
          id="city">

          <input type="text"
          class="input-box"
          placeholder="Pincode"
          id="pincode">

        </div>

        <button class="main-btn"
        onclick="goPayment()">

        Continue To Payment

        </button>

      </div>

      <!-- PAYMENT -->

      <div id="paymentSection"
      style="display:none;">

        <h3 class="title">
          Payment Method
        </h3>

        <select class="input-box"
        id="paymentMethod">

          <option>
            Cash On Delivery
          </option>

          <option>
            UPI
          </option>

          <option>
            Credit / Debit Card
          </option>

        </select>

        <button class="main-btn"
        onclick="placeOrder()">

          Place Order

        </button>

      </div>

      <!-- SUCCESS -->

      <div id="successSection"
      style="display:none;">

        <div class="success-box">

          <h1>
            ✅ Order Placed
          </h1>

          <h4 id="orderId"></h4>

          <p>
            Thank You For Shopping With Us
          </p>

        </div>

        <a href="../home/index.html">

          <button class="pay">
            Back To Shopping
          </button>

        </a>

      </div>

    </div>

  </div>

  <!-- RIGHT SIDE -->

  <div class="right-side">

    <div class="checkout-card">

      <h3 class="title">
        Order Summary
      </h3>

      <div class="summary-row">

        <span>Subtotal</span>

        <span id="subtotal">
          ₹0
        </span>

      </div>

      <div class="summary-row">

        <span>Shipping</span>

        <span>
          ₹50
        </span>

      </div>

      <div class="summary-row">

        <span>Tax</span>

        <span id="tax">
          ₹0
        </span>

      </div>

      <hr>

      <div class="summary-row total">

        <span>Total</span>

        <span id="total">
          ₹0
        </span>

      </div>

    </div>

  </div>

</div>

<script src="checkout.js"></script>

</body>
</html>
