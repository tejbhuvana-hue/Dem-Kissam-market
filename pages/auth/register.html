<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Kissan Market</title>
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--secondary-color);
            padding: 1rem;
        }

        .auth-card {
            width: 100%;
            max-width: 500px;
            padding: 3rem;
            background: white;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid #ddd;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            border-color: var(--primary-color);
        }

        .auth-btn {
            width: 100%;
            margin-top: 1rem;
            justify-content: center;
        }

        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .role-selection {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .role-card-select {
            cursor: pointer;
            text-align: center;
        }

        .role-card-select input {
            display: none;
        }

        .role-card-inner {
            padding: 1rem 0.5rem;
            border: 2px solid #eee;
            border-radius: 12px;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .role-card-inner .icon {
            font-size: 1.5rem;
        }

        .role-card-inner span:last-child {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .role-card-select input:checked+.role-card-inner {
            border-color: var(--primary-color);
            background: #fff8f5;
        }

        .role-card-select input:checked+.role-card-inner span:last-child {
            color: var(--primary-color);
        }

        @media (max-width: 480px) {
            .role-selection {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="auth-container">
        <div class="auth-card fade-in">
            <div class="auth-header">
                <h2>Create Account</h2>
                <p>Join the Kissan Market network</p>
            </div>

            <form id="register-form">
                <div class="role-selection">
                    <label class="role-card-select">
                        <input type="radio" name="role" value="farmer" checked>
                        <div class="role-card-inner">
                            <span class="icon">👨‍🌾</span>
                            <span>Farmer</span>
                        </div>
                    </label>
                    <label class="role-card-select">
                        <input type="radio" name="role" value="vendor">
                        <div class="role-card-inner">
                            <span class="icon">🚚</span>
                            <span>Vendor</span>
                        </div>
                    </label>
                    <label class="role-card-select">
                        <input type="radio" name="role" value="buyer">
                        <div class="role-card-inner">
                            <span class="icon">🛒</span>
                            <span>Buyer</span>
                        </div>
                    </label>
                    <label class="role-card-select">
                        <input type="radio" name="role" value="admin">
                        <div class="role-card-inner">
                            <span class="icon">🛡️</span>
                            <span>Admin</span>
                        </div>
                    </label>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="fullname" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="phone" placeholder="+91 9876543210" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="john@example.com" required>
                </div>

                <div class="form-group">
                    <label>Location / City</label>
                    <input type="text" id="location" placeholder="e.g. Hyderabad, TS" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" id="confirm-password" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary auth-btn">Register Now</button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="./login.html">Login here</a>
            </div>
        </div>
    </div>

    <script src="../../js/app.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', (e) => {
            e.preventDefault();

            const role = document.querySelector('input[name="role"]:checked').value;

            const user = {
                name: document.getElementById('fullname').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                location: document.getElementById('location').value,
                role: role,
                id: Date.now()
            };

            // For common login, we must store the user in a way login can find them
            const users = JSON.parse(localStorage.getItem('km_users')) || [];
            users.push({ ...user, password: document.getElementById('password').value });
            localStorage.setItem('km_users', JSON.stringify(users));

            State.updateProfile(user);
            State.setCurrentUser(user);

            // Redirect
            if (role === 'farmer') {
                window.location.href = '../farmer/dashboard.html';
            } else if (role === 'vendor') {
                window.location.href = '../vendor/dashboard.html';
            } else if (role === 'buyer') {
                window.location.href = '../buyer/home/index.html';
            } else if (role === 'admin') {
                window.location.href = '../admin/dashboard.html';
            }
        });

    </script>
</body>

</html>
