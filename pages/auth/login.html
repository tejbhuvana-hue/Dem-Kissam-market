<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kissan Market</title>

    <link rel="stylesheet" href="../../css/style.css">

    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--secondary-color);
            padding: 1rem;
        }

        .auth-card {
            width: 100%;
            max-width: 450px;
            padding: 3rem;
            background: white;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid #ddd;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            border-color: var(--primary-color);
        }

        .auth-btn {
            width: 100%;
            margin-top: 1rem;
            justify-content: center;
            cursor: pointer;
        }

        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <div class="auth-container">
        <div class="auth-card fade-in">

            <div class="auth-header">
                <h2>Welcome Back!</h2>
                <p>Login to your Kissan Market account</p>
            </div>

            <form id="login-form" onsubmit="event.preventDefault(); log();">

                <div class="form-group">
                    <label>Email / Phone</label>
                    <input type="text" id="email" placeholder="Enter your email or phone" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary auth-btn">
                    Login Now
                </button>

            </form>

            <div class="auth-footer">
                Don't have an account?
                <a href="./register.html">Register Now</a>
            </div>

        </div>
    </div>

    <script src="../../js/app.js"></script>

    <script>

        function log() {

            let email = document.getElementById("email").value;
            let password = document.getElementById("password").value;

            if (email === "admin@12" && password === "admin123") {
                State.setCurrentUser({ id: 0, name: 'Administrator', role: 'admin' });
                window.location.href = '../admin/dashboard.html';
            }
            else if (email === "buyer@12" && password === "buyer123") {
                State.setCurrentUser({ id: 99, name: 'Buyer User', role: 'buyer' });
                window.location.href = '../buyer/home/index.html';
            }
            else if (email === "farmer@12" && password === "farmer123") {
                State.setCurrentUser({ id: 1, name: 'Farmer User', role: 'farmer' });
                window.location.href = '../farmer/dashboard.html';
            }
            else if (email === "vendor@12" && password === "vendor123") {
                State.setCurrentUser({ id: 2, name: 'Vendor User', role: 'vendor' });
                window.location.href = '../vendor/dashboard.html';
            }
            else {
                alert("Invalid Email or Password");
            }

        }

    </script>

</body>

</html>
